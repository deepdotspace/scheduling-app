name = "book2me"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
main = "worker.ts"

[assets]
directory = "dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/ws/*", "/internal/*", "/platform/*"]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AppRecordRoom", "AppYjsRoom", "AppCanvasRoom", "AppMediaRoom", "AppPresenceRoom"]

[durable_objects]
bindings = [
  { name = "RECORD_ROOMS", class_name = "AppRecordRoom" },
  { name = "YJS_ROOMS", class_name = "AppYjsRoom" },
  { name = "CANVAS_ROOMS", class_name = "AppCanvasRoom" },
  { name = "MEDIA_ROOMS", class_name = "AppMediaRoom" },
  { name = "PRESENCE_ROOMS", class_name = "AppPresenceRoom" },
]

[[r2_buckets]]
binding = "FILES"
bucket_name = "book2me-files"

[[services]]
binding = "CALENDAR_WORKER"
service = "calendar-tmp"

[vars]
APP_NAME = "book2me"
# Same host as deepspace client `PROD_CONFIG.platformWorkerUrl` — used when `PLATFORM_WORKER` service binding is absent (local dev).
PLATFORM_WORKER_URL = "https://deepspace-platform-worker.eudaimonicincorporated.workers.dev"
# Override in dashboard / .dev.vars — must match a verified sender in Resend (or your provider).
BOOKING_EMAIL_FROM = "BookMe <book-me@updates.app.space>"
# Skip Resend / `email/send` (set false or remove when you wire transactional email again).
DISABLE_BOOKING_EMAIL = "false"
# Local dev: book2me reaches the calendar worker via HTTP fallback. In production the CALENDAR_WORKER service binding takes precedence and this is ignored.
CALENDAR_WORKER_URL = "http://localhost:8781"
# Dev-only default. In production, `wrangler secret put APP_IDENTITY_TOKEN` overrides this with the real shared secret.
APP_IDENTITY_TOKEN = "dev-calendar-bridge"

[dev]
port = 8780
inspector_port = 9237

# Secrets (set via `wrangler secret put` or written by `deepspace dev`):
#   AUTH_JWT_PUBLIC_KEY
#   AUTH_JWT_ISSUER
#   AUTH_WORKER_URL
#   OWNER_USER_ID
#   INTERNAL_STORAGE_HMAC_SECRET
#   APP_IDENTITY_TOKEN   — must match the same value set on the calendar-tmp worker
